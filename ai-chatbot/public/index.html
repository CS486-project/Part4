<!DOCTYPE html>
<html lang="en">
<head>
    <title>Chatbot Homepage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
</head>
<body id="home">
    <h1>AI Chatbot</h1>
    <p>Welcome! This chatbot uses OpenAI to answer your questions and remembers your conversation history across sessions.</p>
    <div id="participant-section">
        <label>Enter your Participant ID:</label>
        <input type="text" id="participant-input" placeholder="e.g. user123">
        <button id="start-btn">Start Chatting</button>
    </div>

    <script>
        document.getElementById('start-btn').addEventListener('click', () => {
            const participantId = document.getElementById('participant-input').value.trim();
            if (!participantId) {
                alert('Please enter a Participant ID');
            } else {
                localStorage.setItem('participantId', participantId);
                window.location.href = '/chat';
            }
        });
    </script>
</body>
</html>
